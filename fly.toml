app = "claude-lite"
primary_region = "cdg"

[build]

[env]
  DATABASE_URL = "file:/data/app.db"
  NODE_ENV = "production"

[mounts]
  source      = "claude_lite_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[checks]
  [checks.health]
    type         = "http"
    port         = 3000
    path         = "/api/health"
    interval     = "10s"
    timeout      = "5s"
    grace_period = "30s"
